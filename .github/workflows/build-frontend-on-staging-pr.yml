name: Build frontend on staging approval

on:
  pull_request_review:
    types:
      - submitted

jobs:
  build-frontend:
    if: github.event.review.state == 'approved' && github.event.pull_request.base.ref == 'staging' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_GOOGLE_OAUTH2_CLIENT_ID: ${{ secrets.VITE_GOOGLE_OAUTH2_CLIENT_ID }}
        run: npm run build

      - name: Preserve built static files
        run: |
          rm -rf /tmp/backend-static
          mkdir -p /tmp/backend-static
          cp -a backend/static/. /tmp/backend-static/

      - name: Checkout staging
        run: |
          git fetch origin staging
          git checkout staging
          git reset --hard origin/staging

      - name: Replace backend/static on staging
        run: |
          rm -rf backend/static
          mkdir -p backend/static
          cp -a /tmp/backend-static/. backend/static/

      - name: Commit backend/static to staging
        run: |
          if [[ -n "$(git status --porcelain backend/static)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add backend/static
            git commit -m "chore: update backend static on staging"
            git push origin HEAD:staging
          else
            echo "No backend/static changes to commit."
          fi
