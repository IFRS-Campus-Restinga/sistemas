name: Build frontend on staging push

on:
  push:
    branches:
      - staging

jobs:
  update-staging-static:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout staging
        uses: actions/checkout@v4
        with:
          ref: staging
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_GOOGLE_OAUTH2_CLIENT_ID: ${{ secrets.VITE_GOOGLE_OAUTH2_CLIENT_ID }}
        run: npm run build

      - name: Commit backend/static to staging
        run: |
          if [[ -n "$(git status --porcelain backend/static)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add backend/static
            git commit -m "chore: rebuild backend static on staging"
            git push origin HEAD:staging
          else
            echo "No backend/static changes to commit."
          fi
